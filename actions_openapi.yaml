openapi: 3.1.0
info:
  title: Maverickframe HR Bridge
  version: 0.3.0
servers:
  - url: https://maverickframe-hh-bridge.onrender.com
paths:
  /hh/me:
    get:
      operationId: getHHMe
      summary: Get current HH API user
      responses:
        '200': { description: OK }
  /hh/vacancies:
    get:
      operationId: getHHVacancies
      summary: Get HH employer vacancies
      parameters:
        - name: employer_id
          in: query
          required: false
          schema: { type: string }
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: OK }
  /hh/negotiations:
    get:
      operationId: getHHNegotiations
      summary: Get HH vacancy response collections and funnel statistics
      parameters:
        - name: vacancy_id
          in: query
          required: true
          schema: { type: string }
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: OK }
  /hh/responses:
    get:
      operationId: getHHResponses
      summary: Get HH candidate responses for a vacancy
      parameters:
        - name: vacancy_id
          in: query
          required: true
          schema: { type: string }
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: OK }
  /rabota/me:
    get:
      operationId: getRabotaMe
      summary: Get current Rabota.by API user
      responses:
        '200': { description: OK }
  /rabota/vacancies:
    get:
      operationId: getRabotaVacancies
      summary: Get Rabota.by employer vacancies
      parameters:
        - name: employer_id
          in: query
          required: false
          schema: { type: string }
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: OK }
  /rabota/negotiations:
    get:
      operationId: getRabotaNegotiations
      summary: Get Rabota.by vacancy response collections and funnel statistics
      parameters:
        - name: vacancy_id
          in: query
          required: true
          schema: { type: string }
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: OK }
  /rabota/responses:
    get:
      operationId: getRabotaResponses
      summary: Get Rabota.by candidate responses for a vacancy
      parameters:
        - name: vacancy_id
          in: query
          required: true
          schema: { type: string }
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: OK }

  /rabota/responses_short:
    get:
      operationId: getRabotaResponsesShort
      summary: Get shortened Rabota.by candidate responses for a vacancy
      parameters:
        - name: vacancy_id
          in: query
          required: true
          schema: { type: string }
        - name: page
          in: query
          required: false
          schema: { type: integer, default: 0 }
        - name: per_page
          in: query
          required: false
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: OK }

  /sheets/save_candidate:
    post:
      operationId: saveCandidateToSheets
      summary: Save selected candidate to Google Sheets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date_added: { type: string }
                source: { type: string }
                vacancy: { type: string }
                candidate_name: { type: string }
                location: { type: string }
                experience: { type: string }
                skills: { type: string }
                gpt_score: { type: integer }
                status: { type: string }
                recruiter_comment: { type: string }
                resume_link: { type: string }
                suggested_reply: { type: string }
                gpt_summary: { type: string }
      responses:
        '200': { description: OK }
